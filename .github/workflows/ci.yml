name: CI Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore OneDriveAccessGuard.sln

      - name: Build
        run: dotnet build OneDriveAccessGuard.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test tests/OneDriveAccessGuard.Tests/OneDriveAccessGuard.Tests.csproj --configuration Release --no-build --verbosity normal
